name: Generate podcast briefing

on:
  workflow_dispatch:
  repository_dispatch:
    types: [generate-podcast-briefing]

permissions:
  contents: write
  id-token: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
          token_format: access_token

      - name: Generate podcast briefing
        env:
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}
          AIRTABLE_TABLE_NAME: ${{ secrets.AIRTABLE_TABLE_NAME }}
          AIRTABLE_TOKEN: ${{ secrets.AIRTABLE_TOKEN }}
          AIRTABLE_VIEW_NAME: ${{ secrets.AIRTABLE_VIEW_NAME }}
          GOOGLE_CLOUD_PROJECT_ID: ${{ secrets.GOOGLE_CLOUD_PROJECT_ID }}
          GOOGLE_OAUTH_ACCESS_TOKEN: ${{ steps.auth.outputs.access_token }}
          PODCAST_API_LANGUAGE_CODE: ${{ secrets.PODCAST_API_LANGUAGE_CODE }}
          PODCAST_API_LENGTH: ${{ secrets.PODCAST_API_LENGTH }}
          PODCAST_BRIEFING_STORY_LIMIT: ${{ secrets.PODCAST_BRIEFING_STORY_LIMIT }}
        run: node scripts/generate-podcast-briefing.js

      - name: Commit generated audio and feed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add audio data/stories.json
          git diff --cached --quiet && exit 0
          git commit -m "Generate podcast briefing"
          git push
