<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trending Storyline Monitor</title>
    <meta
      name="description"
      content="A public topic monitor for clustering incoming URLs into trends, direction, source spread, and audio briefings."
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="masthead">
        <div class="brand-row">
          <div class="brand-lockup">
            <span class="brand-mark">Y</span>
            <strong>Trending Storyline Monitor</strong>
          </div>
        </div>
      </header>

      <main class="stream-layout">
        <section class="stream-column" aria-label="Main topic feed">
          <div class="stream-intro">
            <h1>Trending topic monitor</h1>
            <p>Incoming URLs are clustered into recurring topics, scored for direction, and opened into the related links behind each trend.</p>
          </div>

          <div class="feed-toolbar">
            <label class="filter-wrap" for="topic-filter">
              <span>topic</span>
              <select id="topic-filter">
                <option value="all">All Topics</option>
              </select>
            </label>
          </div>

          <div id="active-filters" class="active-filters" aria-live="polite"></div>
          <div id="topic-feed" class="topic-feed" aria-live="polite"></div>
        </section>

        <aside class="intel-column" aria-label="Story intelligence">
          <section id="charts-panel" class="intel-panel">
            <div class="chart-block">
              <h3>Topic Volume</h3>
              <div id="topic-volume-chart" class="chart-stack"></div>
            </div>
            <div class="chart-block">
              <h3>Source Spread</h3>
              <div id="source-spread-chart" class="chart-stack"></div>
            </div>
            <div class="chart-block">
              <h3>Trend Direction</h3>
              <div id="trend-direction-chart" class="spark-grid"></div>
            </div>
          </section>

          <section id="topic-panel" class="intel-panel">
            <h2>All Topics</h2>
            <div id="topic-detail" class="topic-detail"></div>
          </section>
        </aside>
      </main>
    </div>
    <script src="./app.js"></script>
  </body>
</html>
